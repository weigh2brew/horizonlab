<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Horizon Lab</title>
  <meta name="theme-color" content="#ffffff">
  <meta name="description" content="Community-driven coffee experiments with Acaia Horizon. Log your brews, discover what works, share your findings.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,700;1,400&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=9">
</head>
<body>

  <!-- ===== LANGUAGE SWITCHER ===== -->
  <div class="lang-switcher" id="langSwitcher">
    <button data-lang="en" class="active">EN</button>
    <button data-lang="zh-TW">繁中</button>
    <button data-lang="zh-CN">简中</button>
    <button data-lang="fr">FR</button>
    <button data-lang="es">ES</button>
    <button data-lang="de">DE</button>
    <button data-lang="ja">日本</button>
    <button data-lang="ko">한국</button>
  </div>

  <!-- ===== HERO ===== -->
  <section id="hero" class="hero">
    <div class="hero-content">
      <h1 class="hero-title">Horizon<br>Lab</h1>
      <p class="hero-tagline" data-i18n="hero_tagline"></p>
      <p class="hero-desc" data-i18n="hero_desc"></p>
      <div class="hero-stats">
        <div class="stat-pill">
          <span class="stat-num" id="statBrews">0</span>
          <span class="stat-label" data-i18n="stat_brews"></span>
        </div>
        <div class="stat-pill">
          <span class="stat-num" id="statOwners">0</span>
          <span class="stat-label" data-i18n="stat_owners"></span>
        </div>
        <div class="stat-pill">
          <span class="stat-num" id="statImpact">--</span>
          <span class="stat-label" data-i18n="stat_impact"></span>
        </div>
      </div>
      <a class="hero-paper" href="whitepaper.html" data-i18n="hero_paper_link"></a>
    </div>
  </section>

  <!-- ===== COMMUNITY VOTE ===== -->
  <section id="vote" class="section">
    <h2 class="section-title" data-i18n="vote_title"></h2>
    <p class="section-subtitle" data-i18n="vote_subtitle"></p>

    <div class="chart-card vote-card">
      <p class="vote-question" data-i18n="vote_question"></p>

      <div class="vote-bar">
        <div class="vote-bar-header">
          <span class="vote-bar-label" data-i18n="vote_yes"></span>
          <span class="vote-bar-pct" id="pctTasteYes">--%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill bar-fill-yes" id="barTasteYes" style="width: 0%"></div>
        </div>
      </div>

      <div class="vote-bar">
        <div class="vote-bar-header">
          <span class="vote-bar-label" data-i18n="vote_no"></span>
          <span class="vote-bar-pct" id="pctTasteNo">--%</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill bar-fill-no" id="barTasteNo" style="width: 0%"></div>
        </div>
      </div>

      <div class="vote-total" id="totalTasting">-- <span data-i18n="votes_suffix"></span></div>
    </div>
  </section>

  <!-- ===== EXPLORER ===== -->
  <section id="dashboard" class="section">
    <h2 class="section-title" data-i18n="explorer_title"></h2>
    <p class="section-subtitle" data-i18n="explorer_subtitle"></p>

    <div class="explorer-filters">
      <div class="explorer-filter">
        <label class="explorer-filter-label" data-i18n="filter_process"></label>
        <div class="filter-pills" data-filter="process">
          <button type="button" class="filter-pill active" data-value="" data-i18n="filter_all"></button>
          <button type="button" class="filter-pill" data-value="Washed">Washed</button>
          <button type="button" class="filter-pill" data-value="Natural">Natural</button>
          <button type="button" class="filter-pill" data-value="Honey">Honey</button>
          <button type="button" class="filter-pill" data-value="Anaerobic">Anaerobic</button>
          <button type="button" class="filter-pill" data-value="Cofermented">Cofermented</button>
        </div>
      </div>
      <div class="explorer-filter">
        <label class="explorer-filter-label" data-i18n="filter_roast"></label>
        <div class="filter-pills" data-filter="roast">
          <button type="button" class="filter-pill active" data-value="" data-i18n="filter_all"></button>
          <button type="button" class="filter-pill" data-value="Light" data-i18n="roast_light"></button>
          <button type="button" class="filter-pill" data-value="Medium" data-i18n="roast_medium"></button>
          <button type="button" class="filter-pill" data-value="Dark" data-i18n="roast_dark"></button>
        </div>
      </div>
    </div>

    <div class="summary-card chart-card" id="summaryCard">
      <div class="chart-empty" data-i18n="chart_empty"></div>
    </div>
  </section>

  <!-- ===== COMMUNITY FEED ===== -->
  <section id="feed" class="section">
    <h2 class="section-title" data-i18n="feed_title"></h2>
    <p class="section-subtitle" data-i18n="feed_subtitle"></p>
    <div class="feed-list" id="feedList">
      <div class="chart-empty" data-i18n="feed_empty"></div>
    </div>
  </section>

  <!-- ===== COMMENTS ===== -->
  <section id="comments" class="section">
    <h2 class="section-title" data-i18n="comments_title"></h2>
    <p class="section-subtitle" data-i18n="comments_subtitle"></p>
    <div class="comments-list" id="commentsList">
      <div class="chart-empty" data-i18n="comments_loading"></div>
    </div>
  </section>

  <!-- ===== EXPLORE GAP ===== -->
  <section id="explore" class="section">
    <h2 class="section-title" data-i18n="explore_title"></h2>
    <p class="section-subtitle" data-i18n="explore_subtitle"></p>
    <div class="gap-grid" id="gapGrid">
      <div class="chart-empty" data-i18n="explore_loading"></div>
    </div>
  </section>

  <!-- ===== SHARE TASTING FEEDBACK ===== -->
  <section id="log" class="section">
    <h2 class="section-title" data-i18n="log_title"></h2>
    <p class="section-subtitle" data-i18n="log_subtitle"></p>

    <!-- Step 1: Serial Verification -->
    <div class="form-card" id="verifyCard">
      <h3 class="form-card-title" data-i18n="verify_title"></h3>
      <p class="form-card-desc" data-i18n="verify_desc"></p>
      <div class="input-row">
        <input type="text" id="serialInput" class="input" data-i18n-placeholder="verify_placeholder" autocomplete="off" spellcheck="false">
        <button class="btn btn-primary" id="btnVerify" data-i18n="btn_verify"></button>
      </div>
      <p class="form-hint" id="verifyMsg"></p>
    </div>

    <!-- Step 2: Brew Form (hidden until verified) -->
    <div class="form-card" id="brewCard" hidden>
      <div class="verified-badge" id="verifiedBadge">
        <span class="verified-icon">&#10003;</span>
        <span data-i18n="verified_label"></span>
        <button class="btn-text" id="btnLogout" data-i18n="btn_change_device"></button>
      </div>

      <form id="brewForm" autocomplete="off">
        <!-- Coffee Origin -->
        <div class="field">
          <label class="field-label" for="coffeeOrigin" data-i18n="field_origin"></label>
          <select id="coffeeOrigin" class="input" required>
            <option value="" disabled selected>—</option>
            <option value="Ethiopia">Ethiopia</option>
            <option value="Colombia">Colombia</option>
            <option value="Brazil">Brazil</option>
            <option value="Kenya">Kenya</option>
            <option value="Guatemala">Guatemala</option>
            <option value="Costa Rica">Costa Rica</option>
            <option value="Panama">Panama</option>
            <option value="Honduras">Honduras</option>
            <option value="Peru">Peru</option>
            <option value="Indonesia">Indonesia</option>
            <option value="Vietnam">Vietnam</option>
            <option value="Rwanda">Rwanda</option>
            <option value="Burundi">Burundi</option>
            <option value="Yemen">Yemen</option>
            <option value="India">India</option>
            <option value="Mexico">Mexico</option>
            <option value="El Salvador">El Salvador</option>
            <option value="Nicaragua">Nicaragua</option>
            <option value="Tanzania">Tanzania</option>
            <option value="Papua New Guinea">Papua New Guinea</option>
            <option value="Jamaica">Jamaica</option>
            <option value="Hawaii">Hawaii</option>
            <option value="China">China</option>
            <option value="Thailand">Thailand</option>
            <option value="Myanmar">Myanmar</option>
            <option value="Blend">Blend</option>
            <option value="Other">Other / Unknown</option>
          </select>
        </div>

        <!-- Process Method -->
        <div class="field">
          <label class="field-label" for="processMethod" data-i18n="field_process"></label>
          <select id="processMethod" class="input" required>
            <option value="" disabled selected>—</option>
            <option value="Washed">Washed</option>
            <option value="Natural">Natural</option>
            <option value="Honey">Honey</option>
            <option value="Anaerobic">Anaerobic</option>
            <option value="Cofermented">Cofermented</option>
          </select>
        </div>

        <!-- Roast Level -->
        <div class="field">
          <label class="field-label" data-i18n="field_roast"></label>
          <div class="roast-options">
            <label class="radio-card">
              <input type="radio" name="roastLevel" value="Light" required>
              <span class="radio-label" data-i18n="roast_light"></span>
            </label>
            <label class="radio-card">
              <input type="radio" name="roastLevel" value="Medium">
              <span class="radio-label" data-i18n="roast_medium"></span>
            </label>
            <label class="radio-card">
              <input type="radio" name="roastLevel" value="Dark">
              <span class="radio-label" data-i18n="roast_dark"></span>
            </label>
          </div>
        </div>

        <!-- Brew Method -->
        <div class="field">
          <label class="field-label" for="brewMethod" data-i18n="field_brew_method"></label>
          <select id="brewMethod" class="input" required>
            <option value="" disabled selected>—</option>
            <option value="Espresso">Espresso</option>
            <option value="Pour Over">Pour Over</option>
          </select>
        </div>

        <!-- Treatment Time -->
        <div class="field">
          <label class="field-label" data-i18n="field_time"></label>
          <div class="time-slider-wrap">
            <input type="range" id="treatmentTime" class="slider" min="0.25" max="3" step="0.25" value="1">
            <div class="time-display"><span id="timeValue">1m</span></div>
          </div>
          <div class="time-ticks">
            <span>15s</span><span>1m</span><span>2m</span><span>3m</span>
          </div>
          <div class="time-manual">
            <span class="time-manual-label" data-i18n="time_manual_label"></span>
            <input type="number" id="treatmentTimeManual" class="input time-manual-input" min="0.25" max="480" step="0.25" value="1">
            <span class="time-manual-unit" data-i18n="time_unit"></span>
          </div>
        </div>

        <!-- Taste Rating -->
        <div class="field">
          <label class="field-label" data-i18n="field_rating"></label>
          <div class="rating-scale">
            <label class="rating-option">
              <input type="radio" name="rating" value="1" required>
              <span class="rating-dot"></span>
              <span class="rating-text" data-i18n="rating_1"></span>
            </label>
            <label class="rating-option">
              <input type="radio" name="rating" value="2">
              <span class="rating-dot"></span>
              <span class="rating-text" data-i18n="rating_2"></span>
            </label>
            <label class="rating-option">
              <input type="radio" name="rating" value="3">
              <span class="rating-dot"></span>
              <span class="rating-text" data-i18n="rating_3"></span>
            </label>
          </div>
        </div>

        <!-- Flavor changes — direction captured per attribute -->
        <div class="field">
          <label class="field-label"><span data-i18n="field_flavors_more"></span> <span class="field-hint" data-i18n="field_flavors_hint"></span></label>
          <div class="flavor-chips flavor-chips-more">
            <label class="chip"><input type="checkbox" data-flavor="Sweetness" data-dir="+"><span data-i18n="flavor_sweetness"></span></label>
            <label class="chip"><input type="checkbox" data-flavor="Acidity" data-dir="+"><span data-i18n="flavor_acidity"></span></label>
            <label class="chip"><input type="checkbox" data-flavor="Body" data-dir="+"><span data-i18n="flavor_body"></span></label>
            <label class="chip"><input type="checkbox" data-flavor="Smoothness" data-dir="+"><span data-i18n="flavor_smoothness"></span></label>
            <label class="chip"><input type="checkbox" data-flavor="Clarity" data-dir="+"><span data-i18n="flavor_clarity"></span></label>
            <label class="chip"><input type="checkbox" data-flavor="Bitterness" data-dir="+"><span data-i18n="flavor_bitterness"></span></label>
            <label class="chip"><input type="checkbox" data-flavor="Aroma" data-dir="+"><span data-i18n="flavor_aroma"></span></label>
            <label class="chip"><input type="checkbox" data-flavor="Aftertaste" data-dir="+"><span data-i18n="flavor_aftertaste"></span></label>
          </div>
        </div>

        <div class="field">
          <label class="field-label"><span data-i18n="field_flavors_less"></span> <span class="field-hint" data-i18n="field_flavors_hint"></span></label>
          <div class="flavor-chips flavor-chips-less">
            <label class="chip"><input type="checkbox" data-flavor="Sweetness" data-dir="-"><span data-i18n="flavor_sweetness"></span></label>
            <label class="chip"><input type="checkbox" data-flavor="Acidity" data-dir="-"><span data-i18n="flavor_acidity"></span></label>
            <label class="chip"><input type="checkbox" data-flavor="Body" data-dir="-"><span data-i18n="flavor_body"></span></label>
            <label class="chip"><input type="checkbox" data-flavor="Smoothness" data-dir="-"><span data-i18n="flavor_smoothness"></span></label>
            <label class="chip"><input type="checkbox" data-flavor="Clarity" data-dir="-"><span data-i18n="flavor_clarity"></span></label>
            <label class="chip"><input type="checkbox" data-flavor="Bitterness" data-dir="-"><span data-i18n="flavor_bitterness"></span></label>
            <label class="chip"><input type="checkbox" data-flavor="Aroma" data-dir="-"><span data-i18n="flavor_aroma"></span></label>
            <label class="chip"><input type="checkbox" data-flavor="Aftertaste" data-dir="-"><span data-i18n="flavor_aftertaste"></span></label>
          </div>
        </div>

        <!-- Notes -->
        <div class="field">
          <label class="field-label" for="brewNote"><span data-i18n="field_note"></span> <span class="field-hint" data-i18n="field_note_hint"></span></label>
          <textarea id="brewNote" class="input textarea" data-i18n-placeholder="field_note_placeholder" maxlength="280" rows="3"></textarea>
          <div class="char-count"><span id="charCount">0</span>/280</div>
        </div>

        <button type="submit" class="btn btn-primary btn-submit" id="btnSubmit" data-i18n="btn_submit"></button>
      </form>

      <!-- Success state -->
      <div class="submit-success" id="submitSuccess" hidden>
        <div class="success-icon">&#10003;</div>
        <h3 data-i18n="success_title"></h3>
        <p data-i18n="success_desc"></p>
        <button class="btn btn-primary" id="btnLogAnother" data-i18n="btn_submit_another"></button>
      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="footer-social">
      <a href="https://www.instagram.com/acaiacoffee/" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.17.054 1.97.24 2.43.403a4.088 4.088 0 011.47.957c.453.453.777.91.957 1.47.163.46.35 1.26.403 2.43.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.054 1.17-.24 1.97-.403 2.43a4.088 4.088 0 01-.957 1.47 4.088 4.088 0 01-1.47.957c-.46.163-1.26.35-2.43.403-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.17-.054-1.97-.24-2.43-.403a4.088 4.088 0 01-1.47-.957 4.088 4.088 0 01-.957-1.47c-.163-.46-.35-1.26-.403-2.43C2.175 15.584 2.163 15.204 2.163 12s.012-3.584.07-4.85c.054-1.17.24-1.97.403-2.43a4.088 4.088 0 01.957-1.47A4.088 4.088 0 015.063 2.293c.46-.163 1.26-.35 2.43-.403C8.759 1.832 9.139 1.82 12 1.82zm0-1.663C8.741.5 8.332.514 7.052.573 5.775.63 4.902.822 4.14 1.104a5.756 5.756 0 00-2.077 1.352A5.756 5.756 0 00.71 4.533C.428 5.295.237 6.168.18 7.445.12 8.725.107 9.134.107 12.393s.014 3.668.073 4.948c.057 1.277.249 2.15.531 2.912a5.756 5.756 0 001.352 2.077 5.756 5.756 0 002.077 1.352c.762.282 1.635.474 2.912.531 1.28.059 1.689.073 4.948.073s3.668-.014 4.948-.073c1.277-.057 2.15-.249 2.912-.531a5.756 5.756 0 002.077-1.352 5.756 5.756 0 001.352-2.077c.282-.762.474-1.635.531-2.912.059-1.28.073-1.689.073-4.948s-.014-3.668-.073-4.948c-.057-1.277-.249-2.15-.531-2.912a5.756 5.756 0 00-1.352-2.077A5.756 5.756 0 0019.86 1.104C19.098.822 18.225.63 16.948.573 15.668.514 15.259.5 12 .5z"/><path d="M12 6.365a5.635 5.635 0 100 11.27 5.635 5.635 0 000-11.27zm0 9.297a3.662 3.662 0 110-7.325 3.662 3.662 0 010 7.325z"/><circle cx="18.406" cy="5.594" r="1.44"/></svg>
      </a>
    </div>
    <p class="footer-brand" data-i18n-html="footer_brand"></p>
    <p class="footer-links"><a href="whitepaper.html">Horizon White Paper</a></p>
  </footer>

  <script src="translations.js?v=14"></script>
  <script src="app.js?v=18"></script>
</body>
</html>
